services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      BACKEND_PUBLIC_URL: http://backend:8000
    ports:
      - "3000:3000"

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    working_dir: /app/apps/backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - .:/app
    environment:
      BACKEND_APP_NAME: Paralax API
      BACKEND_CORS_ORIGINS: '["http://localhost:3000"]'
      BACKEND_DATABASE_URL: postgresql://portfolio:portfolio@postgres:5432/architecture_portfolio
      BACKEND_JWT_SECRET: local-development-jwt-secret-change-me
      BACKEND_PUBLIC_URL: http://backend:8000
      BACKEND_S3_ENDPOINT: http://minio:9000
      BACKEND_S3_PRESIGN_ENDPOINT: http://localhost:9000
      BACKEND_S3_REGION: us-east-1
      BACKEND_S3_BUCKET: architecture-portfolio
      BACKEND_S3_ACCESS_KEY_ID: minioadmin
      BACKEND_S3_SECRET_ACCESS_KEY: minioadmin123
      BACKEND_S3_PUBLIC_BASE_URL: http://localhost:9000/architecture-portfolio
    ports:
      - "8000:8000"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: architecture_portfolio
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d architecture_portfolio"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./docker/minio/cors.json:/tmp/cors.json:ro
    entrypoint: >
      /bin/sh -c '
      mc alias set local http://minio:9000 minioadmin minioadmin123 &&
      mc mb --ignore-existing local/architecture-portfolio &&
      mc anonymous set download local/architecture-portfolio &&
      mc cors set local/architecture-portfolio /tmp/cors.json
      '
    restart: "no"

volumes:
  postgres-data:
  minio-data:
